<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siddharth | Interactive Portfolio</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', sans-serif; background: #050505; color: #ffffff; cursor: none; overflow-x: hidden; }
        .cursor { width: 20px; height: 20px; border: 2px solid #00f0ff; border-radius: 50%; position: fixed; pointer-events: none; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s; z-index: 9999; box-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }
        header { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #111 0%, #000 100%); padding: 5vh 0; position: relative; }
        
        .logo-container { position: relative; width: 150px; height: 150px; margin-bottom: 30px; z-index: 10; }
        .logo-icon { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.6)); transition: opacity 0.1s steps(2); }
        .logo-icon.active { opacity: 1; }
        .glitch-active { animation: png-glitch 0.4s infinite; }

        @keyframes png-glitch {
            0% { transform: translate(0); filter: hue-rotate(0deg); }
            20% { transform: translate(-8px, 4px); filter: hue-rotate(90deg); clip-path: inset(10% 0 30% 0); }
            40% { transform: translate(8px, -4px); filter: hue-rotate(180deg); clip-path: inset(50% 0 10% 0); }
            100% { transform: translate(0); }
        }

        h1 { font-size: 6vw; margin: 0; text-transform: uppercase; letter-spacing: 8px; background: linear-gradient(90deg, #00f0ff, #ff007f, #00f0ff); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flowText 4s linear infinite; }
        @keyframes flowText { to { background-position: -200% center; } }

        h2 { font-weight: 300; letter-spacing: 3px; color: #888; margin-top: 10px; display: flex; gap: 15px; align-items: center; }
        h2 .role-text { display: inline-block; transition: transform 0.3s ease, text-shadow 0.3s ease, color 0.3s ease; cursor: none; text-decoration: none; color: inherit; }
        h2 .role-text:hover { transform: scale(1.1); color: #fff; text-shadow: 0 0 15px rgba(0, 240, 255, 0.8), 0 0 30px rgba(255, 0, 127, 0.6); }
        
        .objective { max-width: 600px; color: #666; line-height: 1.6; margin-top: 20px; }
        section { padding: 100px 10%; border-top: 1px solid #1a1a1a; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: #0a0a0a; padding: 40px; border-radius: 5px; transition: transform 0.4s; border-left: 2px solid #333; }
        .card:hover { transform: translateY(-10px); border-left-color: #00f0ff; background: #111; }
        .card-role { color: #00f0ff; font-size: 0.9em; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="cursor" id="custom-cursor"></div>
    <header>
        <div class="logo-container" id="logo-switcher">
            <img src="keyframe.png" class="logo-icon active">
            <img src="3dcube.png" class="logo-icon">
            <img src="dpad.png" class="logo-icon">
            <img src="play.png" class="logo-icon">
            <img src="sletter.png" class="logo-icon">
        </div>
        <h1>Siddharth</h1>
        <h2>
            <span class="role-text">Unrealist</span> <span style="color:#444">|</span>
            <a href="3d-visualizer.html" class="role-text">3D Visualizer</a> <span style="color:#444">|</span>
            <span class="role-text">Motion Graphic Artist</span>
        </h2>
        <p class="objective">Targeting design assignments within a growth-oriented organization, shaping immersive experiences in the design industry.</p>
    </header>
    <section id="experience">
        <div class="grid">
            <div class="card">
                <h3>Team One Architects</h3>
                <span class="card-role">Unrealist & 3D Visualizer</span>
                <p style="color: #aaa;">Creating virtual real-time walkthroughs in Unreal Engine.</p>
            </div>
            </div>
    </section>
    <script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        const icons = document.querySelectorAll('.logo-icon');
        const logoContainer = document.getElementById('logo-switcher');
        let currentIndex = 0;
        function switchLogo() {
            logoContainer.classList.add('glitch-active');
            let flicker = setInterval(() => { icons.forEach(img => img.classList.remove('active')); icons[Math.floor(Math.random() * icons.length)].classList.add('active'); }, 50);
            setTimeout(() => { clearInterval(flicker); logoContainer.classList.remove('glitch-active'); icons.forEach(img => img.classList.remove('active')); currentIndex = (currentIndex + 1) % icons.length; icons[currentIndex].classList.add('active'); }, 400);
        }
        setInterval(switchLogo, 4000);
    </script>
</body>
</html>
